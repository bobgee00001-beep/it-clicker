<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Clicker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #00ff41;
    --fg-dim: #00cc33;
    --fg-dark: #006622;
    --accent: #00ff41;
    --warn: #ffaa00;
    --danger: #ff3333;
    --panel: #111111;
    --panel-border: #1a1a1a;
    --text: #e0e0e0;
    --text-dim: #888888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }
  .header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--panel-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 1.2rem; font-weight: 700; color: var(--fg); }
  .resource-display {
    font-size: 1.1rem;
    color: var(--fg);
  }
  .cps-display { color: var(--fg-dim); font-size: 0.9rem; }
  .main { flex: 1; display: flex; gap: 12px; padding: 12px; min-height: 0; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 12px;
    overflow-y: auto;
  }
  .left-panel { width: 260px; min-width: 200px; }
  .center-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; min-width: 0; }
  .right-panel { width: 320px; min-width: 260px; }
  .click-btn {
    width: 180px; height: 180px;
    border-radius: 50%;
    border: 3px solid var(--fg);
    background: radial-gradient(circle at 30% 30%, #1a1a1a, #0a0a0a);
    color: var(--fg);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.05s, box-shadow 0.2s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    user-select: none;
    box-shadow: 0 0 20px rgba(0,255,65,0.15);
  }
  .click-btn:hover { box-shadow: 0 0 30px rgba(0,255,65,0.25); }
  .click-btn:active { transform: scale(0.92); }
  .click-btn .icon { font-size: 2.5rem; }
  .click-effect {
    position: absolute;
    pointer-events: none;
    color: var(--fg);
    font-weight: 700;
    font-size: 1.1rem;
    animation: floatUp 0.8s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }
  .panel-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--fg);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 6px;
  }
  .upgrade-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    margin-bottom: 6px;
    border-radius: 6px;
    background: #141414;
    border: 1px solid #1a1a1a;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    opacity: 0.5;
  }
  .upgrade-item.affordable { opacity: 1; border-color: var(--fg-dark); }
  .upgrade-item.affordable:hover { border-color: var(--fg); background: #1a1a1a; }
  .upgrade-item.purchased { border-color: var(--fg); opacity: 1; }
  .upgrade-icon { font-size: 1.3rem; width: 28px; text-align: center; }
  .upgrade-info { flex: 1; min-width: 0; }
  .upgrade-name { font-size: 0.8rem; font-weight: 700; color: var(--text); }
  .upgrade-desc { font-size: 0.7rem; color: var(--text-dim); }
  .upgrade-cost { font-size: 0.75rem; color: var(--warn); font-weight: 700; white-space: nowrap; }
  .upgrade-count { font-size: 0.7rem; color: var(--fg-dim); margin-left: 4px; }
  .shop-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .shop-tab {
    flex: 1;
    padding: 6px;
    font-family: inherit;
    font-size: 0.7rem;
    background: #141414;
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .shop-tab.active { border-color: var(--fg); color: var(--fg); background: #1a1a1a; }
  .ticket-card {
    padding: 8px;
    margin-bottom: 6px;
    border-radius: 6px;
    background: #141414;
    border: 1px solid #1a1a1a;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .ticket-card:hover { border-color: var(--fg); }
  .ticket-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .ticket-type { font-size: 0.7rem; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
  .ticket-p3 { color: #00ff41; background: rgba(0,255,65,0.1); }
  .ticket-p2 { color: #ffaa00; background: rgba(255,170,0,0.1); }
  .ticket-p1 { color: #ff3333; background: rgba(255,51,51,0.1); }
  .ticket-title { font-size: 0.75rem; color: var(--text); }
  .ticket-sla { font-size: 0.65rem; color: var(--text-dim); }
  .ticket-reward { font-size: 0.7rem; color: var(--fg); }
  .prestige-btn {
    width: 100%;
    padding: 12px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    border: 2px dashed var(--fg-dark);
    background: transparent;
    color: var(--fg-dark);
    border-radius: 8px;
    cursor: not-allowed;
    margin-top: 10px;
  }
  .prestige-btn.ready {
    border-color: var(--fg);
    color: var(--fg);
    cursor: pointer;
    animation: pulse 2s infinite;
  }
  .prestige-btn.ready:hover { background: rgba(0,255,65,0.05); }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 5px rgba(0,255,65,0.2); } 50% { box-shadow: 0 0 15px rgba(0,255,65,0.4); } }
  .toast-container {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 1000;
    pointer-events: none;
  }
  .toast {
    background: #1a1a1a;
    border: 1px solid var(--fg);
    color: var(--fg);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.8rem;
    animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.7s forwards;
    text-align: center;
    white-space: nowrap;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(-20px); } }
  .sev1-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,0,0,0.15);
    z-index: 999;
    pointer-events: none;
    animation: sev1Blink 0.5s infinite alternate;
    display: none;
  }
  @keyframes sev1Blink { from { opacity: 0.1; } to { opacity: 0.4; } }
  .sev1-text {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem;
    font-weight: 700;
    color: #ff0000;
    text-shadow: 0 0 20px #ff0000;
    z-index: 1000;
    display: none;
    pointer-events: none;
    animation: sev1Pulse 0.5s infinite alternate;
  }
  @keyframes sev1Pulse { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.05); } }
  .stats-row {
    display: flex;
    gap: 12px;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .save-controls {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .save-btn {
    flex: 1;
    padding: 6px;
    font-family: inherit;
    font-size: 0.7rem;
    background: #141414;
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 4px;
  }
  .save-btn:hover { border-color: var(--fg); color: var(--fg); }
  .backlog-warning {
    color: var(--warn);
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 8px;
    display: none;
  }
  .multiplier-display {
    color: var(--fg);
    font-size: 0.8rem;
  }
  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .left-panel, .right-panel { width: 100%; min-width: auto; }
  }
</style>
</head>
<body>
<div class="sev1-overlay" id="sev1Overlay"></div>
<div class="sev1-text" id="sev1Text">SEV1! ALL HANDS!</div>

<div class="header">
  <div class="header-left">
    <span class="logo">DevOps Clicker</span>
    <span class="resource-display" id="resourceDisplay">CPU Cycles: 0</span>
    <span class="cps-display" id="cpsDisplay">(+0/s)</span>
  </div>
  <div class="header-right">
    <span class="multiplier-display" id="multiplierDisplay">Multiplier: 1.00x</span>
  </div>
</div>

<div class="main">
  <div class="panel left-panel">
    <div class="panel-title">Tickets</div>
    <div class="backlog-warning" id="backlogWarning">Backlog Warnung! >5 offene Tickets</div>
    <div id="ticketList"></div>
    <div class="stats-row">
      <span>Offen: <span id="openTickets">0</span></span>
      <span>Gelöst: <span id="resolvedTickets">0</span></span>
    </div>
  </div>

  <div class="panel center-panel">
    <div class="click-btn" id="clickBtn">
      <span class="icon">🖥️</span>
      <span>BOOT<br>SERVER</span>
    </div>
    <div style="color:var(--text-dim); font-size:0.8rem;">Klicke für CPU Cycles</div>
    <div class="stats-row">
      <span>Pro Klick: <span id="clickPower">1</span></span>
      <span>Prestige: <span id="prestigeLevel">0</span></span>
    </div>
    <div class="save-controls">
      <button class="save-btn" onclick="game.save()">💾 Speichern</button>
      <button class="save-btn" onclick="game.load()">📂 Laden</button>
      <button class="save-btn" onclick="game.exportSave()">📤 Export</button>
      <button class="save-btn" onclick="document.getElementById('importFile').click()">📥 Import</button>
      <input type="file" id="importFile" style="display:none" accept=".json" onchange="game.importSave(this)">
      <button class="save-btn" onclick="game.reset()">🔄 Reset</button>
    </div>
  </div>

  <div class="panel right-panel">
    <div class="panel-title">Upgrade Shop</div>
    <div class="shop-tabs" id="shopTabs"></div>
    <div id="upgradeList"></div>
    <button class="prestige-btn" id="prestigeBtn" onclick="game.prestige()">
      🚀 IPO (ab 1.0M Cycles)
    </button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const UPGRADES = {
  hardware: [
    { id: 'pi', name: 'Raspberry Pi', icon: '🍓', baseCost: 10, baseCps: 0.1, desc: 'Klein aber fein' },
    { id: 'ssd', name: 'SSD Drive', icon: '💾', baseCost: 50, baseCps: 0.5, desc: 'Schnell wie der Blitz' },
    { id: 'cpu', name: 'Multi-Core CPU', icon: '🧠', baseCost: 200, baseCps: 2, desc: 'Parallel ist besser' },
    { id: 'rack', name: 'Server Rack', icon: '🗄️', baseCost: 1000, baseCps: 10, desc: "Rack 'em up!" },
  ],
  cloud: [
    { id: 'vm', name: 'Cloud VM', icon: '☁️', baseCost: 5000, baseCps: 50, desc: 'It scales™' },
    { id: 'k8s', name: 'Kubernetes Cluster', icon: '⚓', baseCost: 25000, baseCps: 250, desc: 'Orchestriert das Chaos' },
    { id: 'cdn', name: 'CDN Edge', icon: '🌐', baseCost: 100000, baseCps: 1000, desc: 'Weltweit unter 100ms' },
  ],
  ai: [
    { id: 'ai', name: 'AI Auto-Scaler', icon: '🤖', baseCost: 500000, baseCps: 5000, desc: 'Skaliert, während du schläfst' },
    { id: 'quantum', name: 'Quantum Core', icon: '⚛️', baseCost: 2000000, baseCps: 25000, desc: 'Die Zukunft ist jetzt' },
  ],
  click: [
    { id: 'kb', name: 'Mechanical Keyboard', icon: '⌨️', baseCost: 100, clickBonus: 1, desc: '+1/Klick' },
    { id: 'mouse', name: 'Gaming Mouse', icon: '🖱️', baseCost: 500, clickBonus: 3, desc: '+3/Klick' },
    { id: 'monitor', name: '4K Monitor Array', icon: '🖥️', baseCost: 2500, clickBonus: 10, desc: '+10/Klick' },
    { id: 'neural', name: 'Neural Interface', icon: '🔌', baseCost: 15000, clickBonus: 50, desc: '+50/Klick' },
  ],
  itsm: [
    { id: 'bot', name: 'Helpdesk Bot', icon: '🤖', baseCost: 500, desc: 'Auto-close P3 nach 5 Sek', itsmType: 'p3', autoClose: 5 },
    { id: 'noc', name: 'NOC Team', icon: '👁️', baseCost: 3000, desc: 'Auto-close P2 nach 10 Sek', itsmType: 'p2', autoClose: 10 },
    { id: 'triaging', name: 'AI Triaging', icon: '🎯', baseCost: 15000, desc: 'Keine SLA auf P3', itsmType: 'p3', noSla: true },
    { id: 'runbook', name: 'Runbook Automation', icon: '📋', baseCost: 75000, desc: 'Auto-close P1 nach 20 Sek', itsmType: 'p1', autoClose: 20 },
    { id: 'autoticket', name: 'Auto-Ticketing', icon: '🎫', baseCost: 200000, desc: '+1% CPS pro Ticket', itsmType: 'all', cpsPerTicket: 0.01 },
  ]
};

const TICKET_TITLES = {
  p3: ['Printer Offline', 'Passwort reset', 'VPN langsam', 'Mailbox voll', 'Monitor flackert', 'Tastatur defekt', 'Maus hängt'],
  p2: ['Database Slow', 'API Timeout', 'Build Failed', 'Deploy Error', 'Memory Leak', 'SSL Expired', 'Backup Failed'],
  p1: ['Full Disk', 'Service Down', 'Data Loss', 'Security Breach', 'Network Outage', 'DB Corruption', 'DDoS Attack']
};

const ACHIEVEMENTS = [
  { id: 'first_click', name: 'Erster Klick', desc: 'Klicke zum ersten Mal', check: g => g.totalClicks >= 1 },
  { id: 'hundred', name: 'Centurion', desc: '100 Cycles gesammelt', check: g => g.cycles >= 100 },
  { id: 'thousand', name: 'Kilo', desc: '1.000 Cycles', check: g => g.cycles >= 1000 },
  { id: 'million', name: 'Mega', desc: '1.000.000 Cycles', check: g => g.cycles >= 1000000 },
  { id: 'first_upgrade', name: 'Investor', desc: 'Erstes Upgrade gekauft', check: g => Object.values(g.upgrades).some(c => c > 0) },
  { id: 'first_ticket', name: 'Support Hero', desc: 'Erstes Ticket gelöst', check: g => g.ticketsResolved >= 1 },
  { id: 'first_prestige', name: 'IPO!', desc: 'Erstes Prestige', check: g => g.prestige >= 1 },
  { id: 'ten_tickets', name: 'Ticket Machine', desc: '10 Tickets gelöst', check: g => g.ticketsResolved >= 10 },
  { id: 'sev1_survivor', name: 'SEV1 Survivor', desc: 'Überlebe einen SEV1', check: g => g.sev1Survived },
  { id: 'all_hardware', name: 'Hardware King', desc: 'Alle Hardware-Upgrades', check: g => ['pi','ssd','cpu','rack'].every(id => (g.upgrades[id]||0)>0) },
];

class Game {
  constructor() {
    this.cycles = 0;
    this.totalClicks = 0;
    this.totalEarned = 0;
    this.cps = 0;
    this.clickPower = 1;
    this.prestige = 0;
    this.multiplier = 1;
    this.upgrades = {};
    this.tickets = [];
    this.ticketsResolved = 0;
    this.ticketsExpired = 0;
    this.sev1Survived = false;
    this.cpsPenalty = 1;
    this.cpsPenaltyTimer = 0;
    this.sev1Active = false;
    this.sev1Timer = 0;
    this.lastTick = Date.now();
    this.lastTicketSpawn = Date.now();
    this.achievements = new Set();
    this.currentTab = 'hardware';
    this.tabs = ['hardware', 'cloud', 'ai', 'click', 'itsm'];
    this.tabNames = { hardware: 'Hardware', cloud: 'Cloud', ai: 'AI/Quantum', click: 'Click', itsm: 'ITSM' };
    this.init();
  }

  init() {
    this.load();
    this.setupUI();
    this.loop();
    setInterval(() => this.spawnTicket(), 1000);
  }

  setupUI() {
    const btn = document.getElementById('clickBtn');
    btn.addEventListener('click', (e) => this.click(e));
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); this.click(e); });
    this.renderTabs();
    this.renderUpgrades();
    this.renderTickets();
  }

  click(e) {
    if (this.sev1Active) return;
    const gain = this.clickPower * this.multiplier;
    this.cycles += gain;
    this.totalEarned += gain;
    this.totalClicks++;
    this.showClickEffect(e, gain);
    this.checkAchievements();
    this.updateDisplay();
  }

  showClickEffect(e, amount) {
    const btn = document.getElementById('clickBtn');
    const rect = btn.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'click-effect';
    el.textContent = '+' + this.fmt(amount);
    const x = e ? (e.clientX || rect.left + rect.width/2) : rect.left + rect.width/2;
    const y = e ? (e.clientY || rect.top) : rect.top;
    el.style.left = (x - 20) + 'px';
    el.style.top = (y - 20) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  fmt(n) {
    if (n >= 1e12) return (n/1e12).toFixed(1) + 'T';
    if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
    return Math.floor(n).toString();
  }

  calculateCps() {
    let cps = 0;
    for (const cat of Object.values(UPGRADES)) {
      for (const u of cat) {
        if (u.baseCps) {
          const count = this.upgrades[u.id] || 0;
          cps += count * u.baseCps;
        }
      }
    }
    // Auto-ticketing bonus
    const autoTicket = this.upgrades['autoticket'] || 0;
    if (autoTicket > 0) {
      cps += cps * (this.tickets.length * 0.01 * autoTicket);
    }
    cps *= this.multiplier;
    if (this.cpsPenaltyTimer > 0) cps *= this.cpsPenalty;
    if (this.sev1Active) cps = 0;
    return cps;
  }

  calculateClickPower() {
    let power = 1;
    for (const u of UPGRADES.click) {
      power += (this.upgrades[u.id] || 0) * u.clickBonus;
    }
    return power;
  }

  loop() {
    const now = Date.now();
    const dt = (now - this.lastTick) / 1000;
    this.lastTick = now;

    this.cps = this.calculateCps();
    const gain = this.cps * dt;
    this.cycles += gain;
    this.totalEarned += gain;

    if (this.cpsPenaltyTimer > 0) {
      this.cpsPenaltyTimer -= dt;
      if (this.cpsPenaltyTimer <= 0) {
        this.cpsPenalty = 1;
        this.toast('SLA-Strafe aufgehoben');
      }
    }

    if (this.sev1Active) {
      this.sev1Timer -= dt;
      if (this.sev1Timer <= 0) {
        this.sev1Active = false;
        document.getElementById('sev1Overlay').style.display = 'none';
        document.getElementById('sev1Text').style.display = 'none';
        this.sev1Survived = true;
        this.toast('SEV1 resolved! CPS zurück');
        this.checkAchievements();
      }
    }

    this.updateTickets(dt);
    this.updateDisplay();
    this.checkAchievements();
    requestAnimationFrame(() => this.loop());
  }

  updateTickets(dt) {
    for (let i = this.tickets.length - 1; i >= 0; i--) {
      const t = this.tickets[i];
      const autoClose = this.getAutoClose(t.type);
      const noSla = this.hasNoSla(t.type);

      if (autoClose > 0) {
        t.autoCloseTimer -= dt;
        if (t.autoCloseTimer <= 0) {
          this.resolveTicket(i, true);
          continue;
        }
      }

      if (!noSla) {
        t.sla -= dt;
        if (t.sla <= 0) {
          this.expireTicket(i);
        }
      }
    }

    // Backlog warning
    const openCount = this.tickets.length;
    document.getElementById('backlogWarning').style.display = openCount > 5 ? 'block' : 'none';

    // SEV1
    if (openCount > 10 && !this.sev1Active) {
      this.triggerSev1();
    }
  }

  getAutoClose(type) {
    const bot = this.upgrades['bot'] || 0;
    const noc = this.upgrades['noc'] || 0;
    const runbook = this.upgrades['runbook'] || 0;
    if (type === 'p3' && bot > 0) return UPGRADES.itsm.find(u => u.id === 'bot').autoClose;
    if (type === 'p2' && noc > 0) return UPGRADES.itsm.find(u => u.id === 'noc').autoClose;
    if (type === 'p1' && runbook > 0) return UPGRADES.itsm.find(u => u.id === 'runbook').autoClose;
    return 0;
  }

  hasNoSla(type) {
    if (type !== 'p3') return false;
    const triaging = this.upgrades['triaging'] || 0;
    return triaging > 0;
  }

  spawnTicket() {
    const now = Date.now();
    const interval = 5000 + Math.random() * 10000;
    if (now - this.lastTicketSpawn < interval) return;
    this.lastTicketSpawn = now;

    if (this.tickets.length >= 15) return;

    const rand = Math.random();
    let type;
    if (rand < 0.6) type = 'p3';
    else if (rand < 0.9) type = 'p2';
    else type = 'p1';

    const titles = TICKET_TITLES[type];
    const title = titles[Math.floor(Math.random() * titles.length)];

    const sla = type === 'p3' ? 45 : type === 'p2' ? 30 : 15;
    const reward = type === 'p3' ? 50 : type === 'p2' ? 150 : 500;

    const ticket = {
      id: Date.now() + Math.random(),
      type,
      title,
      sla,
      maxSla: sla,
      reward,
      autoCloseTimer: this.getAutoClose(type)
    };

    this.tickets.push(ticket);
    this.renderTickets();
  }

  resolveTicket(index, auto = false) {
    const t = this.tickets[index];
    const gain = t.reward * this.multiplier;
    this.cycles += gain;
    this.totalEarned += gain;
    this.ticketsResolved++;
    this.tickets.splice(index, 1);
    if (!auto) this.toast(`Ticket gelöst: +${this.fmt(gain)} Cycles`);
    this.renderTickets();
    this.checkAchievements();
  }

  expireTicket(index) {
    this.tickets.splice(index, 1);
    this.ticketsExpired++;
    this.cpsPenalty = 0.8;
    this.cpsPenaltyTimer = 30;
    this.toast('SLA verletzt! -20% CPS für 30s', 'warn');
    this.renderTickets();
  }

  triggerSev1() {
    this.sev1Active = true;
    this.sev1Timer = 10;
    document.getElementById('sev1Overlay').style.display = 'block';
    document.getElementById('sev1Text').style.display = 'block';
    this.toast('SEV1! ALL HANDS!', 'danger');
  }

  buyUpgrade(id) {
    const all = Object.values(UPGRADES).flat();
    const u = all.find(x => x.id === id);
    if (!u) return;

    const count = this.upgrades[id] || 0;
    const cost = Math.floor(u.baseCost * Math.pow(1.15, count));

    if (this.cycles < cost) return;

    this.cycles -= cost;
    this.upgrades[id] = count + 1;

    if (u.baseCps || u.clickBonus) {
      this.toast(`${u.name} gekauft!`);
    } else {
      this.toast(`${u.name} aktiviert!`);
    }

    this.renderUpgrades();
    this.checkAchievements();
  }

  prestige() {
    if (this.cycles < 1000000) return;
    this.prestige++;
    this.multiplier = 1 + (this.prestige * 0.1);
    this.cycles = 0;
    this.upgrades = {};
    this.tickets = [];
    this.cps = 0;
    this.clickPower = 1;
    this.cpsPenalty = 1;
    this.cpsPenaltyTimer = 0;
    this.toast(`IPO #${this.prestige}! Multiplier: ${this.multiplier.toFixed(2)}x`);
    this.checkAchievements();
  }

  checkAchievements() {
    for (const a of ACHIEVEMENTS) {
      if (this.achievements.has(a.id)) continue;
      if (a.check(this)) {
        this.achievements.add(a.id);
        this.toast(`🏆 ${a.name}: ${a.desc}`);
      }
    }
  }

  toast(msg, type = 'normal') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    if (type === 'warn') el.style.borderColor = 'var(--warn)';
    if (type === 'danger') el.style.borderColor = 'var(--danger)';
    container.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  renderTabs() {
    const container = document.getElementById('shopTabs');
    container.innerHTML = '';
    for (const tab of this.tabs) {
      const btn = document.createElement('button');
      btn.className = 'shop-tab' + (tab === this.currentTab ? ' active' : '');
      btn.textContent = this.tabNames[tab];
      btn.onclick = () => { this.currentTab = tab; this.renderTabs(); this.renderUpgrades(); };
      container.appendChild(btn);
    }
  }

  renderUpgrades() {
    const container = document.getElementById('upgradeList');
    container.innerHTML = '';
    const upgrades = UPGRADES[this.currentTab];
    if (!upgrades) return;

    for (const u of upgrades) {
      const count = this.upgrades[u.id] || 0;
      const cost = Math.floor(u.baseCost * Math.pow(1.15, count));
      const affordable = this.cycles >= cost;
      const hasAny = count > 0;

      const div = document.createElement('div');
      div.className = 'upgrade-item' + (affordable ? ' affordable' : '') + (hasAny ? ' purchased' : '');
      div.onclick = () => this.buyUpgrade(u.id);

      let effect = '';
      if (u.baseCps) effect = `+${u.baseCps} CPS`;
      if (u.clickBonus) effect = `+${u.clickBonus}/Klick`;
      if (u.autoClose) effect = `Auto-close ${u.itsmType.toUpperCase()}`;
      if (u.noSla) effect = 'Keine SLA P3';
      if (u.cpsPerTicket) effect = '+1% CPS/Ticket';

      div.innerHTML = `
        <span class="upgrade-icon">${u.icon}</span>
        <div class="upgrade-info">
          <div class="upgrade-name">${u.name} <span class="upgrade-count">x${count}</span></div>
          <div class="upgrade-desc">${u.desc}${effect ? ' · ' + effect : ''}</div>
        </div>
        <span class="upgrade-cost">${this.fmt(cost)}</span>
      `;
      container.appendChild(div);
    }
  }

  renderTickets() {
    const container = document.getElementById('ticketList');
    container.innerHTML = '';
    for (let i = 0; i < this.tickets.length; i++) {
      const t = this.tickets[i];
      const div = document.createElement('div');
      div.className = 'ticket-card';
      div.onclick = () => this.resolveTicket(i);
      const pct = Math.max(0, (t.sla / t.maxSla) * 100);
      const auto = this.getAutoClose(t.type);
      div.innerHTML = `
        <div class="ticket-header">
          <span class="ticket-type ticket-${t.type}">${t.type.toUpperCase()}</span>
          <span class="ticket-sla">${t.sla > 0 ? t.sla.toFixed(1) + 's' : 'ABGELAUFEN'}</span>
        </div>
        <div class="ticket-title">${t.title}</div>
        <div class="ticket-reward">+${this.fmt(t.reward)} Cycles${auto > 0 ? ' · Auto: ' + t.autoCloseTimer.toFixed(1) + 's' : ''}</div>
        <div style="height:3px; background:#1a1a1a; border-radius:2px; margin-top:4px;">
          <div style="width:${pct}%; height:100%; background:${t.type === 'p1' ? '#ff3333' : t.type === 'p2' ? '#ffaa00' : '#00ff41'}; border-radius:2px; transition:width 0.3s;"></div>
        </div>
      `;
      container.appendChild(div);
    }
    document.getElementById('openTickets').textContent = this.tickets.length;
    document.getElementById('resolvedTickets').textContent = this.ticketsResolved;
  }

  updateDisplay() {
    document.getElementById('resourceDisplay').textContent = 'CPU Cycles: ' + this.fmt(Math.floor(this.cycles));
    document.getElementById('cpsDisplay').textContent = '(' + (this.cps >= 0 ? '+' : '') + this.fmt(this.cps) + '/s)';
    document.getElementById('clickPower').textContent = this.fmt(this.clickPower);
    document.getElementById('prestigeLevel').textContent = this.prestige;
    document.getElementById('multiplierDisplay').textContent = 'Multiplier: ' + this.multiplier.toFixed(2) + 'x';

    const prestigeBtn = document.getElementById('prestigeBtn');
    if (this.cycles >= 1000000) {
      prestigeBtn.classList.add('ready');
      prestigeBtn.textContent = `🚀 IPO #${this.prestige + 1} starten!`;
    } else {
      prestigeBtn.classList.remove('ready');
      prestigeBtn.textContent = `🚀 IPO (ab ${this.fmt(1000000)} Cycles)`;
    }

    this.renderUpgrades();
    this.renderTickets();
  }

  save() {
    const data = {
      cycles: this.cycles,
      totalClicks: this.totalClicks,
      totalEarned: this.totalEarned,
      prestige: this.prestige,
      multiplier: this.multiplier,
      upgrades: this.upgrades,
      ticketsResolved: this.ticketsResolved,
      ticketsExpired: this.ticketsExpired,
      sev1Survived: this.sev1Survived,
      achievements: Array.from(this.achievements)
    };
    localStorage.setItem('devopsClicker', JSON.stringify(data));
    this.toast('💾 Gespeichert!');
  }

  load() {
    const raw = localStorage.getItem('devopsClicker');
    if (!raw) return;
    try {
      const data = JSON.parse(raw);
      this.cycles = data.cycles || 0;
      this.totalClicks = data.totalClicks || 0;
      this.totalEarned = data.totalEarned || 0;
      this.prestige = data.prestige || 0;
      this.multiplier = data.multiplier || 1;
      this.upgrades = data.upgrades || {};
      this.ticketsResolved = data.ticketsResolved || 0;
      this.ticketsExpired = data.ticketsExpired || 0;
      this.sev1Survived = data.sev1Survived || false;
      this.achievements = new Set(data.achievements || []);
      this.clickPower = this.calculateClickPower();
      this.toast('📂 Spielstand geladen!');
    } catch (e) {
      this.toast('Fehler beim Laden');
    }
  }

  reset() {
    if (!confirm('Wirklich zurücksetzen? Alle Fortschritte verloren!')) return;
    localStorage.removeItem('devopsClicker');
    location.reload();
  }

  exportSave() {
    const data = {
      cycles: this.cycles,
      totalClicks: this.totalClicks,
      totalEarned: this.totalEarned,
      prestige: this.prestige,
      multiplier: this.multiplier,
      upgrades: this.upgrades,
      ticketsResolved: this.ticketsResolved,
      ticketsExpired: this.ticketsExpired,
      sev1Survived: this.sev1Survived,
      achievements: Array.from(this.achievements),
      version: 1,
      exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `devops-clicker-save-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    this.toast('📤 Export gespeichert!');
  }

  importSave(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.version || !data.upgrades) {
          throw new Error('Ungültige Savegame-Datei');
        }
        if (!confirm(`Savegame vom ${data.exportedAt?.slice(0,10)||'unbekannt'} importieren? Aktueller Fortschritt wird überschrieben.`)) return;
        this.cycles = data.cycles || 0;
        this.totalClicks = data.totalClicks || 0;
        this.totalEarned = data.totalEarned || 0;
        this.prestige = data.prestige || 0;
        this.multiplier = data.multiplier || 1;
        this.upgrades = data.upgrades || {};
        this.ticketsResolved = data.ticketsResolved || 0;
        this.ticketsExpired = data.ticketsExpired || 0;
        this.sev1Survived = data.sev1Survived || false;
        this.achievements = new Set(data.achievements || []);
        this.clickPower = this.calculateClickPower();
        this.save();
        this.toast('📥 Savegame importiert!');
        this.updateDisplay();
      } catch (err) {
        this.toast('❌ Fehler: ' + err.message);
      }
    };
    reader.readAsText(file);
    input.value = '';
  }
}

const game = new Game();
</script>
